name: Release
run-name: Release ${{ github.event.inputs.tag_name || github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
